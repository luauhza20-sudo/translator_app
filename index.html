<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traductor con Qwen2-0.5B</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: #111827;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    h1 {
      color: #38bdf8;
    }
    .card {
      background: #1f2937;
      padding: 18px;
      border-radius: 12px;
      margin: 16px 0;
      border: 1px solid #334155;
    }
    code {
      background: #0f172a;
      padding: 2px 6px;
      border-radius: 6px;
      color: #86efac;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Traductor con Qwen2-0.5B</h1>

    <div class="card">
      <h2>Descripción</h2>
      <p>
        Esta app traduce texto de un idioma a otro usando un modelo local pequeño tipo Instruct.
      </p>
    </div>

    <div class="card">
      <h2>Ejemplos soportados</h2>
      <ul>
        <li>I like soccer</li>
        <li>How are you?</li>
        <li>What time is it?</li>
      </ul>
    </div>

    <div class="card">
      <h2>Uso</h2>
      <p>
        Ejecuta <code>app.py</code> localmente para abrir la interfaz.
      </p>
    </div>
  </div>
</body>
</html>
